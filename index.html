<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

<body>
    <img id="tamara-main" src="img/tamara.png" />

    <div class="card">

        <div class="destaque">

        <div class="atualizado">

            (<a id="see-all" href="javascript:void(0)">Ver todos os Horários</a>)

        <div class="atualizado">
            Última vez atualizado: <span id="lastUpdated"></span> (<a href="">Atualizar</a>)<br>
        </div>
